# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache planner model
        uses: actions/cache@v4
        with:
          path: public/models/smart-planner-150m-q4
          key: planner-model-smollm2-360m-v1

      - name: Fetch planner model
        run: |
          pip install huggingface_hub
          node scripts/run-python.mjs scripts/fetch-models.py --planner-only
        env:
          HF_HUB_CACHE: /tmp/hf-cache

      - name: Verify planner model assets
        run: node scripts/run-python.mjs scripts/verify-local-models.py --root public/models --label "source planner model assets"

      - name: Validate translation source manifest
        run: bun run validate:translation-sources

      - name: Fetch translation models (priority)
        run: node scripts/run-python.mjs scripts/fetch-translation-models.py --priority
        env:
          HF_HUB_CACHE: /tmp/hf-cache

      - name: Verify local translation model bundles
        run: node scripts/run-python.mjs scripts/validate-local-translation-models.py --models-dir public/models

      - name: Build app
        run: bun run build

      - name: Verify planner model assets in build output
        run: |
          node scripts/run-python.mjs scripts/verify-local-models.py --root dist/models --label "artifact planner model assets"
          node scripts/run-python.mjs scripts/validate-local-translation-models.py --models-dir dist/models

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload the built static site
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
